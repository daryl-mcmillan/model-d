<html>
<head>
<title>synth</title>
<style>
input.slider {
	width: 300px;
}
</style>
</head>

<body>
	<div>
		<input id="f" type="range" class="slider" min="0" max="5" step="0.01" value="1.61">
		<label for="f">frequency</label>
	</div>
	<div>
		<input id="d1" type="range" class="slider" min="-1" max="1" step="0.001" value="-0.014">
		<label for="d1">detune 1</label>
	</div>
	<div>
		<input id="d2" type="range" class="slider" min="-1" max="1" step="0.001" value="1">
		<label for="d2">detune 2</label>
	</div>
	<div>
		<input id="l" type="range" class="slider" min="0.1" max="40" step="0.1" value="9.7">
		<label for="l">lfo</label>
	</div>
	<div>
		<input id="ld" type="range" class="slider" min="0.0" max="1.0" step="0.001" value="0.1">
		<label for="ld">lfo depth</label>
	</div>
	<div>
		<input id="cutoff" type="range" class="slider" min="-1.0" max="1.0" step="0.001" value="0.1">
		<label for="cutoff">filter cutoff</label>
	</div>

<script>
function levelNode( ctx ) {
	new 
}

document.body.onclick = async function() {
	document.body.onclick = function() {};

	const audio = new AudioContext();

	await audio.audioWorklet.addModule("filter.js");
	const filter = new AudioWorkletNode(
		audio,
		"filter",
		{
			numberOfInputs: 1,
			numberOfOutputs: 1,
			outputChannelCount: [1]
		}
	);
	const filterCutoff = filter.parameters.get("cutoff");
	filter.connect( audio.destination );

	const dest = filter;

	const osc = new OscillatorNode(audio);
	osc.type = "sawtooth";
	osc.frequency.value = 50;	
	osc.connect(dest);
	osc.start();

	const osc2 = new OscillatorNode(audio);
	osc2.type = "sawtooth";
	osc2.frequency.value = 51;	
	osc2.connect(dest);
	osc2.start();

	const osc3 = new OscillatorNode(audio);
	osc3.type = "sawtooth";
	osc3.frequency.value = 100;
	osc3.connect(dest);
	osc3.start();

	const lfodepth = new GainNode(audio);
	lfodepth.gain.value = 1;
	lfodepth.connect(filterCutoff);

	const lfo = new OscillatorNode(audio);
	lfo.type = "triangle";
	lfo.frequency.value = 5;
	lfo.connect(lfodepth);
	
	await audio.audioWorklet.addModule("amount.js");
	const filterDepth = new AudioWorkletNode(
		audio,
		"amount",
		{
			numberOfInputs: 0,
			numberOfOutputs: 1,
			outputChannelCount: [1]
		}
	);
	const filterDepthParam = filterDepth.parameters.get("amount");
	filterDepthParam.value = 1.0;
	filterDepth.connect( filterCutoff );

	lfo.start();

	var vtof = function(v) {
		return Math.pow(2, v) * 27.5;
	};

	var f = document.getElementById("f");
	var d1 = document.getElementById("d1");
	var d2 = document.getElementById("d2");
	var l = document.getElementById("l");
	var ld = document.getElementById("ld");
	var cutoff = document.getElementById("cutoff");
	var updateAll = function(val) {
		var freq = vtof(f.value);
		osc.frequency.value = vtof(f.valueAsNumber);
		osc2.frequency.value = vtof(f.valueAsNumber+d1.valueAsNumber);
		osc3.frequency.value = vtof(f.valueAsNumber+d2.valueAsNumber);
		lfo.frequency.value = l.valueAsNumber;
		lfodepth.gain.value = ld.valueAsNumber;
		filterDepthParam.value = cutoff.valueAsNumber;
	};
	var attachEvents = function( node ) {
		node.oninput = updateAll;
	};
	attachEvents(f);
	attachEvents(d1);
	attachEvents(d2);
	attachEvents(l);
	attachEvents(ld);
	attachEvents(cutoff);

	updateAll();
}
</script>
</body>
</html>
