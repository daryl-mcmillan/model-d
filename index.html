<html>
<head>
<title>synth</title>
<style>
input.slider {
	width: 300px;
}
</style>
</head>

<body>
	<div>
		<input id="f" type="range" class="slider" min="0" max="5" step="0.01" value="0.62">
		<label for="f">frequency</label>
	</div>
	<div>
		<input id="d1" type="range" class="slider" min="-1" max="1" step="0.001" value="-0.014">
		<label for="d1">detune 1</label>
	</div>
	<div>
		<input id="d2" type="range" class="slider" min="-1" max="1" step="0.001" value="1">
		<label for="d2">detune 2</label>
	</div>
	<div>
		<input id="l" type="range" class="slider" min="0.1" max="40" step="0.1" value="7.8">
		<label for="l">lfo rate</label>
	</div>
	<div>
		<input id="ld" type="range" class="slider" min="0.0" max="1.0" step="0.001" value="0.631">
		<label for="ld">lfo depth</label>
	</div>
	<div>
		<input id="cutoff" type="range" class="slider" min="0" max="1.0" step="0.001" value="0.458">
		<label for="cutoff">filter cutoff</label>
	</div>
	<div>
		<input id="cutoffMod" type="checkbox" checked>
		<label for="cutoffMod">filter modulation</label>
	</div>
	<div>
		<button id="start">start</button>
	</div>
	<pre id="error"></pre>

<script>

async function startup() {

	const audio = new AudioContext();

	const lfo = function() {
		const lfoDepth = new GainNode(audio);
		lfoDepth.gain.value = 1;

		const lfoRate = new OscillatorNode(audio);
		lfoRate.type = "triangle";
		lfoRate.frequency.value = 5;
		lfoRate.connect(lfoDepth);
		lfoRate.start();

		return {
			rate: lfoRate.frequency,
			depth: lfoDepth.gain,
			connect: function(target) { lfoDepth.connect(target); }
		};
	}();

	const mix = new GainNode(audio);

	const osc = new OscillatorNode(audio);
	osc.type = "sawtooth";
	osc.frequency.value = 50;	
	osc.connect(mix);
	osc.start();

	const osc2 = new OscillatorNode(audio);
	osc2.type = "sawtooth";
	osc2.frequency.value = 51;	
	osc2.connect(mix);
	osc2.start();

	const osc3 = new OscillatorNode(audio);
	osc3.type = "sawtooth";
	osc3.frequency.value = 100;
	osc3.connect(mix);
	osc3.start();

	await audio.audioWorklet.addModule("filter.js");
	const filter = function() {
		const filterNode = new AudioWorkletNode(
			audio,
			"filter",
			{
				numberOfInputs: 1,
				numberOfOutputs: 1,
				outputChannelCount: [1]
			}
		);
		const filterCutoffParam = filterNode.parameters.get("cutoff");

		const filterCutoff = new ConstantSourceNode(audio);
		filterCutoff.connect(filterCutoffParam);
		filterCutoff.offset.value = 1.0;
		filterCutoff.start();

		const filterModAmount = new GainNode(audio);
		filterModAmount.connect(filterCutoffParam);
		filterModAmount.gain = 0;

		lfo.connect(filterModAmount);
		mix.connect(filterNode);

		return {
			cutoff: filterCutoff.offset,
			modDepth: filterModAmount.gain,
			connect: function(target) { filterNode.connect(target); }
		};
	}();

	filter.connect(audio.destination);
	filter.modDepth.value = 0;

	var vtof = function(v) {
		return Math.pow(2, v) * 27.5;
	};

	var f = document.getElementById("f");
	var d1 = document.getElementById("d1");
	var d2 = document.getElementById("d2");
	var l = document.getElementById("l");
	var ld = document.getElementById("ld");
	var cutoff = document.getElementById("cutoff");
	var cutoffMod = document.getElementById("cutoffMod");
	var updateAll = function(val) {
		var freq = vtof(f.value);
		osc.frequency.value = vtof(f.valueAsNumber);
		osc2.frequency.value = vtof(f.valueAsNumber+d1.valueAsNumber);
		osc3.frequency.value = vtof(f.valueAsNumber+d2.valueAsNumber);
		lfo.rate.value = l.valueAsNumber;
		lfo.depth.value = ld.valueAsNumber;
		filter.cutoff.value = cutoff.valueAsNumber;
		filter.modDepth.value = cutoffMod.checked ? 1 : 0;
	};
	var attachEvents = function( node ) {
		node.oninput = updateAll;
	};
	attachEvents(f);
	attachEvents(d1);
	attachEvents(d2);
	attachEvents(l);
	attachEvents(ld);
	attachEvents(cutoff);
	attachEvents(cutoffMod);
	updateAll();
}

const startButton = document.getElementById("start");

var asyncHook = async function() {
	startButton.onclick = function() {};
	startButton.disabled = true;
	try {
		await startup();
	} catch( e ) {
		document.getElementById("error").innerText = e.toString();
	}
};

startButton.onclick = asyncHook;

</script>
</body>
</html>
